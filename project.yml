name: WanderCard
options:
  bundleIdPrefix: dev.garibong
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  WanderCard:
    type: application
    platform: iOS
    sources:
      - path: WanderCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard
        PRODUCT_NAME: WanderCard
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_FILE: WanderCard/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: WanderCard/WanderCard.entitlements
    dependencies:
      - target: ShareExtension
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
      - path: WanderCard/Core/Services/SharedPendingStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard.share
        PRODUCT_NAME: WanderCardShare
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
  WanderCardTests:
    type: bundle.unit-test
    platform: iOS
    sources: [WanderCardTests]
    dependencies:
      - target: WanderCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/WanderCard.app/WanderCard
schemes:
  WanderCard:
    build:
      targets:
        WanderCard: all
        ShareExtension: all
        WanderCardTests: [test]
    test:
      targets:
        - WanderCardTests
