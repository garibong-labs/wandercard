name: WanderCard
options:
  bundleIdPrefix: dev.garibong
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  WanderCard:
    type: application
    platform: iOS
    sources:
      - path: WanderCard
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard
        PRODUCT_NAME: WanderCard
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: WanderCard
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 여행 사진을 카드 이미지로 생성하기 위해 사진 라이브러리에 접근합니다.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 생성된 카드를 사진 라이브러리에 저장합니다.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: dev.garibong.wandercard
            CFBundleURLSchemes:
              - wandercard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: WanderCard/WanderCard.entitlements
    dependencies:
      - target: ShareExtension
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
      - path: WanderCard/Core/Services/SharedPendingStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard.share
        PRODUCT_NAME: WanderCardShare
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
  WanderCardTests:
    type: bundle.unit-test
    platform: iOS
    sources: [WanderCardTests]
    dependencies:
      - target: WanderCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.garibong.wandercard.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/WanderCard.app/WanderCard
schemes:
  WanderCard:
    build:
      targets:
        WanderCard: all
        ShareExtension: all
        WanderCardTests: [test]
    test:
      targets:
        - WanderCardTests
